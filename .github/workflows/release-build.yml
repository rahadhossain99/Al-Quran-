name: Build Optimized Debug APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # আধুনিক প্রজেক্টের জন্য JDK 21 সেটআপ করা
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # গিটহাব সার্ভারের জন্য আধুনিক Gradle 9.3.1 ডাউনলোড ও সেটআপ করা
    - name: Setup Gradle 9.3.1
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'

    # গিটহাবে থাকা এনকোড করা ফাইল থেকে আসল debug.keystore চাবিটি তৈরি করা
    - name: Decode Debug Keystore
      run: base64 -d debug.keystore.base64 > debug.keystore

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload Optimized APK
      uses: actions/upload-artifact@v4
      with:
        name: optimized-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
